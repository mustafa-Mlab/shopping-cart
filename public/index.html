<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Shopping cart app" />
    <link rel="icon" href="/build/favicon.ico" />
    <link rel="apple-touch-icon" href="/build/logo192.png" />
    <link rel="manifest" href="/build/manifest.json" />
    <title>Shopping Cart</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #ffffff;
        color: #222;
      }

      #root {
        min-height: 100vh;
      }

      .loading-state {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div class="loading-state">Loading shopping cart...</div>
    </div>
    <script>
      (function () {
        var buildBase = '/build/';
        var root = document.getElementById('root');

        function showError(message) {
          root.innerHTML = '<div class="loading-state">' + message + '</div>';
        }

        function injectStyles(files) {
          files.forEach(function (file) {
            var link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = buildBase + file;
            document.head.appendChild(link);
          });
        }

        function loadScript(src) {
          return new Promise(function (resolve, reject) {
            var script = document.createElement('script');
            script.src = src;
            script.defer = true;
            script.onload = resolve;
            script.onerror = reject;
            document.body.appendChild(script);
          });
        }

        fetch(buildBase + 'asset-manifest.json', { cache: 'no-store' })
          .then(function (response) {
            if (!response.ok) {
              throw new Error('Build assets are missing. Run npm run build first.');
            }

            return response.json();
          })
          .then(function (manifest) {
            var entrypoints = manifest.entrypoints || [];
            var styles = entrypoints.filter(function (file) {
              return file.slice(-4) === '.css';
            });
            var scripts = entrypoints.filter(function (file) {
              return file.slice(-3) === '.js';
            });

            injectStyles(styles);

            return scripts.reduce(function (promise, file) {
              return promise.then(function () {
                return loadScript(buildBase + file);
              });
            }, Promise.resolve());
          })
          .catch(function (error) {
            showError(error.message);
          });
      })();
    </script>
  </body>
</html>
